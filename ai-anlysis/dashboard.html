    <td style="color:#aaa">${i+1}</td>
    <td style="font-weight:500">${c.name}</td>
    <td style="font-family:monospace;font-size:12px">${c.ticker}</td>
    <td><span class="chip">${c.count}</span></td>
    <td style="font-size:12px;color:#555;max-width:300px">${summary}</td>
  </tr>`;
});

// ── All mentions explorer ─────────────────────────────────────────────────
// Flatten all mentions
const allMentions = [];
RAW.forEach(r => {
  (r.mentions || []).forEach(m => {
    allMentions.push({ company: r.company, ticker: r.ticker, ...m });
  });
});

// Populate category filter
const catFilter = document.getElementById('filter-cat');
catKeys.forEach(k => {
  catFilter.innerHTML += `<option value="${k}">${CAT_LABELS[k] || k}</option>`;
});

const sentBadge = s => {
  const cls = { positive:'badge-pos', neutral:'badge-neu', cautious:'badge-cau', negative:'badge-neg' }[s] || 'badge-neu';
  return `<span class="badge ${cls}">${s}</span>`;
};

function filterMentions() {
  const q    = document.getElementById('search-mentions').value.toLowerCase();
  const cat  = document.getElementById('filter-cat').value;
  const sent = document.getElementById('filter-sent').value;
  const tbody = document.getElementById('mentions-tbody');
  tbody.innerHTML = '';
  let count = 0;
  allMentions.forEach(m => {
    if (cat  && m.category  !== cat)  return;
    if (sent && m.sentiment !== sent) return;
    if (q && !((m.quote||'').toLowerCase().includes(q) || m.company.toLowerCase().includes(q))) return;
    count++;
    tbody.innerHTML += `<tr>
      <td style="font-size:12px;white-space:nowrap">${m.company}</td>
      <td><span class="chip">${CAT_LABELS[m.category] || m.category}</span></td>
      <td>${sentBadge(m.sentiment)}</td>
      <td style="font-size:12px;color:#888">${m.speaker_role || '—'}</td>
      <td style="font-size:12px;color:#888">${m.section || '—'}</td>
      <td style="font-size:12px;max-width:400px">${m.quote}</td>
    </tr>`;
  });
  document.getElementById('mentions-count').textContent = count + ' mentions shown';
}
filterMentions();

// ── No AI companies ───────────────────────────────────────────────────────
document.getElementById('no-ai-list').textContent =
  SUMMARY.not_mentioned.map(c => c.name + ' (' + c.ticker + ')').join(', ') || 'All companies mentioned AI.';
</script>
</body>
</html>
